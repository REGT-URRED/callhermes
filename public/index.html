<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CallHermes</title>

<!-- Silero VAD - UMD bundle via CDN -->
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.26/dist/bundle.min.js"></script>

<!-- Porcupine Web (wake word) - carga diferida, fallback si falla -->
<script src="https://cdn.jsdelivr.net/npm/@picovoice/porcupine-web@3.0.2/dist/web/iife/index.js"
  onerror="window._porcupineFailed=true"></script>
<script src="https://cdn.jsdelivr.net/npm/@picovoice/web-voice-processor@3.0.2/dist/iife/index.js"
  onerror="window._porcupineFailed=true"></script>

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #14141f;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --accent: #6c5ce7;
    --accent-glow: rgba(108, 92, 231, 0.3);
    --recording: #e74c3c;
    --recording-glow: rgba(231, 76, 60, 0.4);
    --processing: #f39c12;
    --processing-glow: rgba(243, 156, 18, 0.3);
    --speaking: #2ecc71;
    --speaking-glow: rgba(46, 204, 113, 0.3);
    --sleep: #1a1a2e;
    --sleep-glow: rgba(30, 30, 60, 0.1);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  .orb-container { position: relative; display: flex; align-items: center; justify-content: center; }

  .orb {
    width: 160px; height: 160px; border-radius: 50%;
    background: var(--surface); position: relative; z-index: 2;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 0 0 var(--accent-glow), 0 4px 20px rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }

  .orb-inner {
    width: 80px; height: 80px; border-radius: 50%;
    background: var(--accent); opacity: 0.15;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .orb svg { position: absolute; width: 40px; height: 40px; fill: var(--text-dim); transition: all 0.4s ease; }

  .orb.sleeping {
    background: var(--sleep);
    box-shadow: 0 0 8px var(--sleep-glow);
    opacity: 0.5;
  }
  .orb.sleeping .orb-inner { opacity: 0.05; }
  .orb.sleeping svg { fill: var(--text-dim); opacity: 0.3; }

  .orb.listening { box-shadow: 0 0 20px rgba(108, 92, 231, 0.15); }
  .orb.listening .orb-inner { opacity: 0.15; animation: breathe 3s ease-in-out infinite; }

  .orb.speaking { background: var(--recording); box-shadow: 0 0 60px var(--recording-glow); animation: orb-pulse 1s ease-in-out infinite; }
  .orb.speaking .orb-inner { background: #fff; opacity: 0.3; transform: scale(1.3); }
  .orb.speaking svg { fill: #fff; }

  .orb.processing { background: var(--processing); box-shadow: 0 0 40px var(--processing-glow); animation: spin-slow 2s linear infinite; }
  .orb.processing .orb-inner { background: #fff; opacity: 0.25; }
  .orb.processing svg { fill: #fff; }

  .orb.responding { background: var(--speaking); box-shadow: 0 0 40px var(--speaking-glow); animation: orb-pulse 0.8s ease-in-out infinite; }
  .orb.responding .orb-inner { background: #fff; opacity: 0.35; transform: scale(1.2); }
  .orb.responding svg { fill: #fff; }

  @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  @keyframes orb-pulse { 0%, 100% { box-shadow: 0 0 40px rgba(231, 76, 60, 0.2); } 50% { box-shadow: 0 0 80px rgba(231, 76, 60, 0.5); } }
  @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .status-label { margin-top: 24px; font-size: 15px; font-weight: 500; color: var(--text-dim); letter-spacing: 0.5px; text-transform: uppercase; transition: color 0.3s; }
  .status-label.sleeping { color: var(--text-dim); opacity: 0.4; }
  .status-label.speaking { color: var(--recording); }
  .status-label.processing { color: var(--processing); }
  .status-label.responding { color: var(--speaking); }

  .wave-bars { display: flex; align-items: flex-end; justify-content: center; gap: 3px; height: 60px; margin-top: 32px; opacity: 0.15; transition: opacity 0.4s ease; }
  .wave-bars.active { opacity: 0.4; }
  .wave-bars .bar { width: 3px; background: var(--accent); border-radius: 2px; transition: height 0.1s ease; min-height: 4px; }

  .transcript { margin-top: 20px; max-width: 480px; width: 90%; min-height: 48px; padding: 16px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; font-size: 14px; line-height: 1.5; color: var(--text-dim); text-align: center; transition: all 0.3s ease; opacity: 0; }
  .transcript.visible { opacity: 1; }
  .transcript .label { color: var(--accent); font-weight: 600; }
  .transcript .response-text { color: var(--speaking); }
  .transcript .stt-text { color: var(--text-dim); font-style: italic; display: block; font-size: 12px; margin-top: 4px; }

  .bottom-info { position: fixed; bottom: 24px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .connection-badge { font-size: 11px; color: var(--text-dim); opacity: 0.5; }
  .connection-badge .ok { color: var(--speaking); }
  .hint { font-size: 12px; color: var(--text-dim); opacity: 0.4; text-align: center; }

  .bargein-badge {
    position: absolute; top: -8px; right: -8px;
    background: var(--recording); color: #fff; font-size: 10px; padding: 2px 6px;
    border-radius: 8px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 10; font-weight: 600;
  }
  .bargein-badge.show { opacity: 1; }

  .wake-badge {
    position: absolute; top: -8px; left: -8px;
    background: var(--accent); color: #fff; font-size: 9px; padding: 2px 6px;
    border-radius: 8px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 10; font-weight: 600;
  }
  .wake-badge.show { opacity: 1; }
</style>
</head>
<body>

<div class="orb-container">
  <div class="orb sleeping" id="orb">
    <div class="orb-inner"></div>
    <svg viewBox="0 0 24 24" id="orbIcon">
      <path d="M12 14a4 4 0 0 0 4-4V6a4 4 0 0 0-8 0v4a4 4 0 0 0 4 4z"/>
      <path d="M19 10a7 7 0 0 1-14 0"/>
    </svg>
  </div>
  <div class="bargein-badge" id="bargeinBadge">✦ BARGE-IN</div>
  <div class="wake-badge" id="wakeBadge">⚡ WAKE</div>
</div>

<div class="status-label sleeping" id="statusLabel">DORMIDO</div>

<div class="wave-bars" id="waveBars">
  <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div>
</div>

<div class="transcript" id="transcript"></div>

<div class="bottom-info">
  <div class="connection-badge" id="connBadge">conectando...</div>
  <div class="hint" id="hintText">Inicializando...</div>
</div>

<script>
(function() {
  'use strict';

  // ═══ CONFIGURACIÓN ═══════════════════════════════════════════════════════
  // Obtén tu AccessKey gratis en https://console.picovoice.ai/
  // Sin access key: wake word desactivado (modo siempre-escucha)
  const PICOVOICE_ACCESS_KEY = ''; // ← PON TU KEY AQUÍ

  // ═══ DOM refs ════════════════════════════════════════════════════════════
  const orb          = document.getElementById('orb');
  const statusLabel  = document.getElementById('statusLabel');
  const waveBars     = document.getElementById('waveBars');
  const bars         = [...waveBars.querySelectorAll('.bar')];
  const transcript   = document.getElementById('transcript');
  const connBadge    = document.getElementById('connBadge');
  const orbIcon      = document.getElementById('orbIcon');
  const bargeinBadge = document.getElementById('bargeinBadge');
  const wakeBadge    = document.getElementById('wakeBadge');
  const hintText     = document.getElementById('hintText');

  // ═══ State machine ═══════════════════════════════════════════════════════
  const State = {
    SLEEPING: 0,
    LISTENING: 1,
    SPEAKING: 2,
    PROCESSING: 3,
    RESPONDING: 4,
  };
  const stateNames = ['sleeping', 'listening', 'speaking', 'processing', 'responding'];
  const stateLabels = ['DORMIDO', 'ESCUCHANDO...', 'HABLANDO', 'PROCESANDO', 'RESPONDIENDO'];
  const stateLabelClasses = ['sleeping', '', 'speaking', 'processing', 'responding'];

  let state = State.PROCESSING;
  let stream = null;
  let mediaRecorder = null;
  let audioChunks = [];
  let recordingStart = 0;
  let abortController = null;
  let currentAudio = null;
  let vadClient = null;
  let vadFailed = false;
  let silenceTimer = null;
  const sessionId = crypto.randomUUID();

  // Wake word state
  let porcupineEngine = null;
  let webVoiceProcessor = null;
  let wakeWordEnabled = false;
  let wakeWordReady = false;
  let idleTimer = null;
  const IDLE_TIMEOUT_MS = 30000;

  // Audio context for wave visualization
  let audioCtx = null;
  let analyser = null;

  // ═══ Set visual state ════════════════════════════════════════════════════
  function setState(newState) {
    state = newState;
    orb.className = 'orb ' + stateNames[state];
    statusLabel.textContent = stateLabels[state];
    statusLabel.className = 'status-label ' + stateLabelClasses[state];

    switch (state) {
      case State.SLEEPING:
        orbIcon.innerHTML = '<circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" opacity="0.3"/><path d="M17 6l-10 10M7 6l10 10"/>';
        break;
      case State.LISTENING:
        orbIcon.innerHTML = '<path d="M12 14a4 4 0 0 0 4-4V6a4 4 0 0 0-8 0v4a4 4 0 0 0 4 4z"/><path d="M19 10a7 7 0 0 1-14 0"/>';
        break;
      case State.SPEAKING:
        orbIcon.innerHTML = '<circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M8 8l8 8M8 16l8-8"/>';
        break;
      case State.PROCESSING:
        orbIcon.innerHTML = '<circle cx="12" cy="12" r="6" fill="currentColor"/><circle cx="12" cy="12" r="3" fill="#f39c12"/>';
        break;
      case State.RESPONDING:
        orbIcon.innerHTML = '<path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
        break;
    }
  }

  // ═══ Idle timeout ════════════════════════════════════════════════════════
  function resetIdleTimer() {
    if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
    if (wakeWordEnabled && (state === State.LISTENING || state === State.RESPONDING)) {
      idleTimer = setTimeout(goToSleep, IDLE_TIMEOUT_MS);
    }
  }

  function goToSleep() {
    if (!wakeWordEnabled) return;
    cancelCurrentResponse();
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      try { mediaRecorder.stop(); } catch(e) {}
    }
    setState(State.SLEEPING);
    pauseVAD();
    hintText.textContent = 'Di "Computer" para activarme';
  }

  function onWakeWord() {
    if (state !== State.SLEEPING) return;
    showWakeBadge(true);
    setTimeout(() => showWakeBadge(false), 1500);
    setState(State.LISTENING);
    resumeVAD();
    resetIdleTimer();
    hintText.textContent = 'Te escucho...';
  }

  function toggleSleep() {
    if (state === State.SLEEPING) {
      onWakeWord();
    } else if (state === State.LISTENING) {
      goToSleep();
    }
  }

  // ═══ Wave animation ═══════════════════════════════════════════════════════
  function updateWave(level) {
    if (state !== State.SPEAKING && state !== State.LISTENING) {
      waveBars.classList.remove('active');
      return;
    }
    waveBars.classList.add('active');
    const scaled = Math.min(level * 80, 1);
    for (let i = 0; i < bars.length; i++) {
      const variation = 0.4 + Math.sin(Date.now() / 200 + i * 0.6) * 0.3 + Math.random() * 0.3;
      const h = Math.max(4, scaled * variation * 60);
      bars[i].style.height = h + 'px';
    }
  }

  function startWaveVisualization() {
    if (!audioCtx || !analyser) return;
    const buffer = new Float32Array(analyser.fftSize);
    function tick() {
      requestAnimationFrame(tick);
      analyser.getFloatTimeDomainData(buffer);
      let sum = 0;
      for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
      updateWave(Math.sqrt(sum / buffer.length));
    }
    tick();
  }

  // ═══ Transcript ═══════════════════════════════════════════════════════════
  function showTranscript(hermesText, sttText) {
    let html = `<div><span class="label">Hermes:</span> <span class="response-text">${hermesText}</span></div>`;
    if (sttText) html += `<span class="stt-text">«${sttText}»</span>`;
    transcript.innerHTML = html;
    transcript.classList.add('visible');
    clearTimeout(transcript._timeout);
    transcript._timeout = setTimeout(() => transcript.classList.remove('visible'), 15000);
  }

  function showSTT(text) {
    transcript.innerHTML = `<span class="stt-text">«${text}»</span>`;
    transcript.classList.add('visible');
  }

  // ═══ Wake word badges ════════════════════════════════════════════════════
  function showWakeBadge(show) { wakeBadge.classList.toggle('show', show); }
  function showBargein(show) { bargeinBadge.classList.toggle('show', show); }

  // ═══ Cancel response ═════════════════════════════════════════════════════
  function cancelCurrentResponse() {
    if (abortController) { try { abortController.abort(); } catch(e) {} abortController = null; }
    if (currentAudio) {
      try { currentAudio.pause(); currentAudio.src = ''; currentAudio = null; } catch(e) {}
    }
  }

  // ═══ Recording ═══════════════════════════════════════════════════════════
  function startRecording() {
    if (state === State.SPEAKING) return;
    if (!stream) return;

    if (state === State.RESPONDING) {
      showBargein(true);
      cancelCurrentResponse();
      setTimeout(() => showBargein(false), 2000);
    }

    audioChunks = [];
    recordingStart = Date.now();
    setState(State.SPEAKING);

    try { mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' }); }
    catch { mediaRecorder = new MediaRecorder(stream); }

    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => sendAudio();
    mediaRecorder.start(100);
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  }

  // ═══ Send audio ══════════════════════════════════════════════════════════
  async function sendAudio() {
    if (audioChunks.length === 0) { setState(State.LISTENING); resetIdleTimer(); return; }
    setState(State.PROCESSING);

    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    abortController = new AbortController();

    try {
      const resp = await fetch('/api/audio', {
        method: 'POST', body: blob, signal: abortController.signal,
        headers: { 'X-Session-ID': sessionId },
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        showTranscript(err.error || `Error ${resp.status}`);
        setState(State.LISTENING);
        resetIdleTimer();
        return;
      }

      const respSessionId = resp.headers.get('X-Session-ID');

      const responseText = resp.headers.get('X-Response-Text');
      const sttText = resp.headers.get('X-Transcript');
      if (sttText) showSTT(sttText);

      await playStreamingAudio(resp, responseText, sttText);

    } catch (e) {
      if (e.name === 'AbortError') return; // barge-in
      showTranscript('Error de conexión');
      setState(State.LISTENING);
      resetIdleTimer();
    } finally {
      abortController = null;
    }
  }

  // ═══ Streaming audio playback ════════════════════════════════════════════
  function playStreamingAudio(response, responseText, sttText) {
    return new Promise((resolve) => {
      // Try MediaSource first
      try {
        if (!('MediaSource' in window) || !MediaSource.isTypeSupported('audio/mpeg')) {
          return fallbackPlay(response, responseText, sttText).then(resolve);
        }
      } catch(e) {
        return fallbackPlay(response, responseText, sttText).then(resolve);
      }

      const mediaSource = new MediaSource();
      const audio = new Audio();
      currentAudio = audio;
      audio.src = URL.createObjectURL(mediaSource);

      let sourceBuffer = null;
      const chunkQueue = [];
      let streamEnded = false;
      let mediaSourceReady = false;

      mediaSource.onsourceopen = () => {
        try {
          sourceBuffer = mediaSource.addSourceBuffer('audio/mpeg');
          mediaSourceReady = true;
        } catch (e) {
          return fallbackPlay(response, responseText, sttText).then(resolve);
        }

        sourceBuffer.onupdateend = () => {
          if (chunkQueue.length > 0) {
            sourceBuffer.appendBuffer(chunkQueue.shift());
          } else if (streamEnded && mediaSource.readyState === 'open') {
            try { mediaSource.endOfStream(); } catch(e) {}
          }
        };

        readStream(response, sourceBuffer, chunkQueue)
          .then(() => {
            streamEnded = true;
            if (!sourceBuffer.updating && chunkQueue.length === 0 && mediaSource.readyState === 'open') {
              try { mediaSource.endOfStream(); } catch(e) {}
            }
          })
          .catch(() => {});
      };

      audio.oncanplay = () => {
        setState(State.RESPONDING);
        if (responseText) showTranscript(responseText, sttText);
        audio.play().catch(() => {});
      };

      audio.onended = () => {
        URL.revokeObjectURL(audio.src); currentAudio = null;
        setState(State.LISTENING);
        resetIdleTimer();
        resolve();
      };
      audio.onerror = () => {
        URL.revokeObjectURL(audio.src); currentAudio = null;
        setState(State.LISTENING);
        resetIdleTimer();
        resolve();
      };
    });
  }

  async function readStream(response, sourceBuffer, chunkQueue) {
    const reader = response.body.getReader();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      if (!sourceBuffer.updating) sourceBuffer.appendBuffer(value);
      else chunkQueue.push(value);
    }
  }

  // Fallback: collect all, then play
  async function fallbackPlay(response, responseText, sttText) {
    const reader = response.body.getReader();
    const allChunks = [];
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      allChunks.push(value);
    }
    const blob = new Blob(allChunks, { type: 'audio/mpeg' });
    const url = URL.createObjectURL(blob);
    const audio = new Audio();
    currentAudio = audio;
    audio.oncanplay = () => {
      setState(State.RESPONDING);
      if (responseText) showTranscript(responseText, sttText);
      audio.play().catch(() => {});
    };
    audio.onended = () => { URL.revokeObjectURL(url); currentAudio = null; setState(State.LISTENING); resetIdleTimer(); };
    audio.onerror = () => { URL.revokeObjectURL(url); currentAudio = null; setState(State.LISTENING); resetIdleTimer(); };
    audio.src = url;
  }

  // ═══ Silero VAD ══════════════════════════════════════════════════════════
  async function initVAD(micStream) {
    if (typeof VAD === 'undefined') throw new Error('VAD library not loaded');

    hintText.textContent = 'Descargando modelo VAD (15MB)...';

    const vad = await VAD.createStreamingService({
      onSpeechStart: () => startRecording(),
      onSpeechEnd: () => stopRecording(),
      positiveSpeechThreshold: 0.55,
      negativeSpeechThreshold: 0.15,
      minSpeechFrames: 3,
      preSpeechPadFrames: 10,
      redemptionFrames: 60,
      frameSamples: 1536,
    });

    vadClient = vad;
    // Don't start VAD yet — will start in SLEEPING or LISTENING

    return vad;
  }

  function pauseVAD() {
    if (vadClient && vadClient.pause) vadClient.pause();
  }

  function resumeVAD() {
    if (vadClient && vadClient.resume) vadClient.resume();
  }

  // ═══ Fallback VAD (RMS-based) ═══════════════════════════════════════════
  function startBasicVAD() {
    if (!analyser) return;
    vadFailed = true;
    hintText.textContent = 'Usando VAD básico por RMS';

    const VAD_THRESHOLD = 0.025;
    const VAD_STOP = 0.008;
    const START_FRAMES = 12;
    const STOP_FRAMES = 200;
    const MAX_RECORDING = 60000;
    let loudFrames = 0, silentFrames = 0;
    const buffer = new Float32Array(analyser.fftSize);

    function tick() {
      requestAnimationFrame(tick);
      if (state === State.SLEEPING) { loudFrames = 0; silentFrames = 0; return; }

      analyser.getFloatTimeDomainData(buffer);
      let sum = 0;
      for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
      const rms = Math.sqrt(sum / buffer.length);

      if (state === State.LISTENING || state === State.RESPONDING) {
        if (rms > VAD_THRESHOLD) {
          loudFrames++;
          if (loudFrames >= START_FRAMES) {
            if (state === State.RESPONDING) {
              showBargein(true); cancelCurrentResponse(); setTimeout(() => showBargein(false), 2000);
            }
            startRecording();
            loudFrames = 0;
          }
        } else loudFrames = Math.max(0, loudFrames - 1);
      } else if (state === State.SPEAKING) {
        if (rms < VAD_STOP) { silentFrames++; if (silentFrames >= STOP_FRAMES) stopRecording(); }
        else silentFrames = 0;
        if (Date.now() - recordingStart > MAX_RECORDING) stopRecording();
      }
    }
    tick();
  }

  // ═══ Porcupine Wake Word ════════════════════════════════════════════════
  async function initWakeWord(micStream) {
    if (!PICOVOICE_ACCESS_KEY) {
      hintText.textContent = 'Sin wake word (falta PICOVOICE_ACCESS_KEY)';
      return false;
    }
    if (window._porcupineFailed) {
      hintText.textContent = 'Wake word no disponible (CDN falló)';
      return false;
    }

    const PorcupineWeb = window.PorcupineWeb;
    const WebVoiceProcessor = window.WebVoiceProcessor;
    if (!PorcupineWeb || !WebVoiceProcessor) {
      hintText.textContent = 'Wake word no disponible (librería no cargada)';
      return false;
    }

    try {
      hintText.textContent = 'Cargando wake word...';

      porcupineEngine = await PorcupineWeb.create({
        accessKey: PICOVOICE_ACCESS_KEY,
        keywords: [{ label: 'computer', sensitivity: 0.5 }],
      });

      webVoiceProcessor = await WebVoiceProcessor.create({
        engines: [porcupineEngine],
        streams: [micStream],
      });

      porcupineEngine.on('detection', () => onWakeWord());
      return true;
    } catch (e) {
      console.warn('Porcupine wake word failed:', e);
      hintText.textContent = 'Wake word desactivado: ' + e.message;
      return false;
    }
  }

  // ═══ Health check ════════════════════════════════════════════════════════
  async function checkHealth() {
    try {
      const r = await fetch('/api/health');
      const d = await r.json();
      if (d.status === 'ok') connBadge.innerHTML = '✓ <span class="ok">conectado</span>';
    } catch { connBadge.innerHTML = '✗ sin conexion'; }
  }

  // ═══ Init ════════════════════════════════════════════════════════════════
  async function init() {
    // Health check
    checkHealth();
    setInterval(checkHealth, 30000);

    // Get mic
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          sampleRate: 16000, channelCount: 1,
          echoCancellation: true, noiseSuppression: true, autoGainControl: true,
        }
      });
    } catch (e) {
      connBadge.innerHTML = '❌ micrófono bloqueado';
      statusLabel.textContent = 'PERMISO DE MIC DENEGADO';
      hintText.textContent = 'Permite el micrófono en la barra de direcciones';
      setState(State.LISTENING);
      return;
    }

    // Audio context + analyser for wave visualization
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.3;
    const source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    startWaveVisualization();

    // Try wake word first (needs mic stream)
    wakeWordEnabled = await initWakeWord(stream);

    // Try Silero VAD with timeout
    try {
      const vadPromise = initVAD(stream);
      const timeoutPromise = new Promise((_, reject) =>
        setTimeout(() => reject(new Error('VAD timeout')), 20000)
      );
      await Promise.race([vadPromise, timeoutPromise]);

      if (wakeWordEnabled) {
        connBadge.innerHTML = '✓ <span class="ok">Silero VAD + wake</span>';
        setState(State.SLEEPING);
        hintText.textContent = 'Di "Computer" para activarme';
      } else {
        connBadge.innerHTML = '✓ <span class="ok">Silero VAD</span>';
        setState(State.LISTENING);
        hintText.textContent = 'Habla naturalmente — Silero VAD activo';
        resumeVAD();
      }
    } catch (e) {
      console.warn('Silero VAD failed:', e);
      connBadge.innerHTML = '⚠ <span class="ok">VAD básico</span>';
      startBasicVAD();
      if (wakeWordEnabled) {
        setState(State.SLEEPING);
      } else {
        setState(State.LISTENING);
      }
    }
  }

  // ═══ Click orb ═══════════════════════════════════════════════════════════
  orb.addEventListener('click', () => {
    switch (state) {
      case State.SLEEPING:
        onWakeWord();
        break;
      case State.LISTENING:
        if (wakeWordEnabled) goToSleep();
        else startRecording();
        break;
      case State.SPEAKING:
        stopRecording();
        break;
      case State.RESPONDING:
        showBargein(true); cancelCurrentResponse(); setTimeout(() => showBargein(false), 2000);
        setState(State.LISTENING);
        resetIdleTimer();
        break;
      case State.PROCESSING:
        // Can't cancel processing
        break;
    }
  });

  // ═══ Keyboard shortcuts ══════════════════════════════════════════════════
  document.addEventListener('keydown', (e) => {
    if (e.key === ' ' && e.target === document.body) {
      e.preventDefault();
      if (state === State.LISTENING || state === State.SLEEPING) {
        if (state === State.SLEEPING) onWakeWord();
        else startRecording();
      } else if (state === State.SPEAKING) {
        stopRecording();
      }
    }
    if (e.key === 'Escape') {
      cancelCurrentResponse();
      if (wakeWordEnabled && state !== State.SLEEPING) goToSleep();
    }
  });

  // ═══ Override setState for VAD + idle timer ══════════════════════════════
  const origSetState = setState;
  setState = function(newState) {
    origSetState(newState);
    // Pause VAD during speaking/processing to avoid echo feedback
    if (newState === State.SPEAKING || newState === State.PROCESSING || newState === State.SLEEPING) {
      pauseVAD();
    } else if (newState === State.LISTENING || newState === State.RESPONDING) {
      resumeVAD();
    }
  };

  // ═══ Start ═══════════════════════════════════════════════════════════════
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
